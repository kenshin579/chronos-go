name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_ADDR: 127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: Test (core, -p 1 for the shared Redis DB)
        run: go test ./... -race -p 1

      - name: Test (contrib/prometheus)
        run: cd contrib/prometheus && go test ./... -race

      - name: Test (contrib/webui)
        run: cd contrib/webui && go test ./... -race -p 1
